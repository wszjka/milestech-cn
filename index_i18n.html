<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script>
// Detect browser language and redirect
(function(){
  var lang = (navigator.language || navigator.userLanguage || 'en').substring(0,2).toLowerCase();
  var supported = ['en','zh','es','ru','ar'];
  if (supported.indexOf(lang) === -1) lang = 'en';
  window.location.replace(lang + '/index.html');
})();
</script>
</head>
<body>
<p>Redirecting... <a href="en/index.html">English</a> | <a href="zh/index.html">中文</a> | <a href="es/index.html">Español</a> | <a href="ru/index.html">Русский</a> | <a href="ar/index.html">العربية</a></p>
</body>
</html>
